name: ShiftOps CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Package for Azure
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Package everything Azure needs: source, deps, and build output
          zip -r deploy.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "node_modules/.cache/*" \
            -x ".env*" \
            -x "tests/*" \
            -x "playwright*"
          echo "Package size: $(du -h deploy.zip | cut -f1)"

      - name: Deploy to Azure
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Deploy pre-built app (no remote build needed)
          curl -X POST \
            -u "${{ secrets.AZURE_SCM_USER }}:${{ secrets.AZURE_SCM_PASS }}" \
            --data-binary @deploy.zip \
            -H "Content-Type: application/zip" \
            --max-time 600 \
            "https://shiftops-app.scm.azurewebsites.net/api/zipdeploy?isAsync=true" \
            -w "\nHTTP Status: %{http_code}\n" \
            -o deploy_response.txt
          cat deploy_response.txt || true
          echo "Deploy initiated successfully"

  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --project=chromium
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
