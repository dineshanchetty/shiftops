name: ShiftOps CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  # ─── Build & Deploy ─────────────────────────────────────────────
  build-and-deploy:
    name: Build & Deploy to Azure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      # Deploy to Azure on push to main
      - name: Create deployment package
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: zip -r deploy.zip . -x ".git/*" "node_modules/*" "test-results/*" "playwright-report/*" ".next/cache/*" "supabase/*" "tests/*" "docs/*" ".claude/*" "screenshots/*"

      - name: Deploy to Azure via Kudu ZIP
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SCM_USER: ${{ secrets.AZURE_SCM_USER }}
          SCM_PASS: ${{ secrets.AZURE_SCM_PASS }}
        run: |
          echo "Deploying to Azure App Service..."
          curl -s -X POST \
            -u "$SCM_USER:$SCM_PASS" \
            --data-binary @deploy.zip \
            -H "Content-Type: application/zip" \
            "https://shiftops-app.scm.azurewebsites.net/api/zipdeploy?isAsync=false" \
            -w "\nHTTP Status: %{http_code}\n" \
            -o /dev/null
          echo "Deployment complete"

  # ─── E2E Tests (on PR only) ──────────────────────────────────
  test:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --project=chromium
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
